# https://gleam.run/writing-gleam/gleam-toml/.

[dependencies]
gleam_stdlib = ">= 1.0.0 and < 2.0.0"
lustre = ">= 5.7.0 and < 6.0.0"

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
lustre_dev_tools = ">= 2.3.6 and < 3.0.0"

[tools.lustre.html]
title = "Martha M. Nieto's Portfolio"
links = [
  { rel = "icon", type = "image/svg+xml", href = "/code-circle.svg" },
  { rel = "preconnect", href = "https://fonts.googleapis.com" },
  { rel = "preconnect", href = "https://fonts.gstatic.com", crossorigin = "" },
]
stylesheets = [
  { href = "https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" },
  { content = "body { margin: 0; opacity: 1; transition: opacity 0.5s; } #app { min-height: 100vh; }" },
]
